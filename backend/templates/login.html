<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TravelGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a1628; --navy-mid: #112240; --gold: #c9a84c; --gold-light: #e8c97a; --sand: #f5f0e8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; display: flex; }

        .left-panel {
            flex: 1.1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            min-height: 100vh;
        }
        .left-bg {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=1308') center/cover no-repeat;
        }
        .left-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,22,40,0.92) 0%, rgba(10,22,40,0.4) 60%, rgba(10,22,40,0.2) 100%); }
        .left-top { position: absolute; top: 40px; left: 50px; z-index: 2; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: white; text-decoration: none; }
        .logo span { color: var(--gold); }
        .left-content { position: relative; z-index: 2; }
        .left-content h2 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: white; margin-bottom: 12px; line-height: 1.2; }
        .left-content p { color: rgba(255,255,255,0.65); font-size: 0.95rem; line-height: 1.7; font-weight: 300; }
        .divider-gold { width: 50px; height: 2px; background: var(--gold); margin-bottom: 18px; }

        .right-panel {
            width: 480px;
            background: var(--sand);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 55px;
            min-height: 100vh;
        }
        .form-header { margin-bottom: 38px; }
        .form-header .eyebrow { color: var(--gold); font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px; }
        .form-header h2 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--navy); }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--navy); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid rgba(10,22,40,0.15);
            background: white; color: var(--navy);
            font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            border-radius: 2px; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: var(--gold); }
        .form-group input::placeholder { color: #aaa; }

        .btn-login {
            width: 100%; padding: 15px;
            background: var(--navy); color: var(--gold);
            border: none; font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; border-radius: 2px;
            margin-top: 8px; transition: background 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-login::after { content: '→'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); transition: right 0.3s; }
        .btn-login:hover { background: #1a2f52; }
        .btn-login:hover::after { right: 15px; }

        .register-text { margin-top: 24px; color: #666; font-size: 0.85rem; text-align: center; }
        .register-text a { color: var(--navy); font-weight: 700; text-decoration: none; border-bottom: 1px solid var(--gold); }
        .btn-back { display: inline-flex; align-items: center; gap: 7px; margin-top: 18px; color: #888; font-size: 0.82rem; text-decoration: none; transition: color 0.3s; }
        .btn-back:hover { color: var(--navy); }

        .alert { padding: 12px 16px; background: #fff0f0; color: #c0392b; border-left: 3px solid #c0392b; border-radius: 2px; margin-bottom: 20px; font-size: 0.85rem; }
        .success { padding: 12px 16px; background: #f0fff4; color: #27ae60; border-left: 3px solid #27ae60; border-radius: 2px; margin-bottom: 20px; font-size: 0.85rem; }

        @media (max-width: 820px) { .left-panel { display: none; } .right-panel { width: 100%; } }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="left-bg"></div>
        <div class="left-overlay"></div>
        <div class="left-top"><a href="/" class="logo">Travel<span>Go</span></a></div>
        <div class="left-content">
            <div class="divider-gold"></div>
            <h2>Explore the<br><em style="font-style:italic; color:var(--gold-light)">World with Us</em></h2>
            <p>Start your journey with TravelGo today. Thousands of routes, one platform.</p>
        </div>
    </div>
    <div class="right-panel">
        <div class="form-header">
            <div class="eyebrow">✦ Welcome Back</div>
            <h2>Sign In</h2>
        </div>

        {% if error %}<div class="alert"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}
        {% if message %}<div class="success"><i class="fas fa-check-circle"></i> {{ message }}</div>{% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="register-text">Don't have an account? <a href="/register">Register here</a></div>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left" style="font-size:0.75rem;"></i> Back to Home</a>
    </div>
</body>
</html>
