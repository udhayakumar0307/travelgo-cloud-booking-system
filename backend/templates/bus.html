<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bus Booking — TravelGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a1628; --navy-mid: #112240; --gold: #c9a84c; --gold-light: #e8c97a; --sand: #f5f0e8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: white; min-height: 100vh; }

        .page-bg {
            min-height: 100vh;
            background: linear-gradient(rgba(10,22,40,0.62), rgba(10,22,40,0.78)),
                url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2000') center/cover fixed no-repeat;
            padding: 0 0 60px;
        }

        /* TOP BAR */
        .topbar { background: rgba(10,22,40,0.85); backdrop-filter: blur(10px); padding: 18px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201,168,76,0.15); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
        .logo span { color: var(--gold); }
        .back-btn { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.82rem; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; transition: color 0.3s; }
        .back-btn:hover { color: var(--gold); }

        /* PAGE HEADER */
        .page-header { text-align: center; padding: 55px 20px 40px; }
        .page-header .eyebrow { color: var(--gold); font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 12px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; line-height: 1.15; }
        .page-header h1 em { font-style: italic; color: var(--gold-light); }

        /* SEARCH BAR */
        .search-wrap { max-width: 850px; margin: 0 auto 35px; padding: 0 20px; }
        .search-bar { background: rgba(255,255,255,0.07); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.12); border-radius: 3px; padding: 18px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; min-width: 130px; padding: 11px 14px; background: rgba(255,255,255,0.9); color: var(--navy); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
        .search-input::placeholder { color: #999; }
        .btn-search { background: var(--gold); color: var(--navy); border: none; padding: 11px 28px; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; white-space: nowrap; }
        .btn-search:hover { background: var(--gold-light); }

        /* FILTERS */
        .filters { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; flex-wrap: wrap; padding: 0 20px; }
        .filter-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.82rem; color: rgba(255,255,255,0.75); }
        .filter-label input { accent-color: var(--gold); }

        /* LIST */
        .list-wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .list-item {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 3px solid var(--gold);
            border-radius: 3px;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s, transform 0.3s;
        }
        .list-item:hover { background: rgba(255,255,255,0.13); transform: translateX(4px); }
        .item-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
        .item-meta { font-size: 0.82rem; color: rgba(255,255,255,0.62); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .item-meta .sep { color: var(--gold); }
        .item-price { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold-light); margin-bottom: 10px; text-align: right; }
        .item-price span { font-size: 0.75rem; font-family: 'DM Sans', sans-serif; color: rgba(255,255,255,0.5); font-weight: 400; }
        .btn-book { display: block; background: var(--gold); color: var(--navy); padding: 10px 24px; border-radius: 2px; text-decoration: none; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; transition: 0.3s; text-align: center; }
        .btn-book:hover { background: var(--gold-light); transform: translateY(-1px); }

        .no-results { text-align: center; padding: 40px; color: rgba(255,255,255,0.45); font-size: 0.95rem; display: none; }
        .no-results i { display: block; font-size: 2rem; color: var(--gold); opacity: 0.4; margin-bottom: 10px; }

        @media (max-width: 640px) { .topbar { padding: 15px 20px; } .page-header h1 { font-size: 2rem; } }
    </style>
</head>
<body>
<div class="page-bg">
    <div class="topbar">
        <a href="/dashboard" class="logo">Travel<span>Go</span></a>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="page-header">
        <div class="eyebrow">✦ Road Journeys</div>
        <h1>Book Your <em>Bus</em></h1>
    </div>

    <div class="search-wrap">
        <div class="search-bar">
            <select class="search-input" id="srcSelect"><option value="">Source City</option><option>Hyderabad</option><option>Chennai</option><option>Bangalore</option><option>Mumbai</option><option>Delhi</option></select>
            <select class="search-input" id="dstSelect"><option value="">Destination City</option><option>Bangalore</option><option>Hyderabad</option><option>Mumbai</option><option>Jaipur</option><option>Goa</option><option>Coimbatore</option></select>
            <input type="date" class="search-input">
            <input type="number" class="search-input" placeholder="Seats" min="1" value="1" style="max-width:90px;">
            <button class="btn-search" onclick="filterList()">Search</button>
        </div>
    </div>

    <div class="filters">
        <label class="filter-label"><input type="checkbox" checked> AC Sleeper</label>
        <label class="filter-label"><input type="checkbox" checked> Non-AC Sleeper</label>
        <label class="filter-label"><input type="checkbox" checked> AC Seater</label>
        <label class="filter-label"><input type="checkbox" checked> Volvo Multi-Axle</label>
    </div>

    <div class="list-wrap" id="busList">
        {% for bus in buses %}
        <div class="list-item" data-src="{{ bus.source|lower }}" data-dest="{{ bus.dest|lower }}">
            <div>
                <div class="item-name">{{ bus.name }}</div>
                <div class="item-meta">
                    <span>{{ bus.source }}</span><span class="sep"><i class="fas fa-arrow-right" style="font-size:0.7em;"></i></span><span>{{ bus.dest }}</span>
                    <span class="sep">·</span><span>Overnight Service</span>
                </div>
            </div>
            <div style="text-align:right; min-width:110px;">
                <div class="item-price">₹{{ bus.price }} <span>/ seat</span></div>
                <a href="/seat/{{ bus.id }}/{{ bus.price }}" class="btn-book">Book Now</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="no-results" id="noResults"><i class="fas fa-bus"></i> No buses found for this route.</div>
</div>

<script>
    function filterList() {
        const src = document.getElementById('srcSelect').value.toLowerCase();
        const dst = document.getElementById('dstSelect').value.toLowerCase();
        const items = document.querySelectorAll('#busList .list-item');
        let found = 0;
        items.forEach(item => {
            const sm = !src || item.dataset.src.includes(src);
            const dm = !dst || item.dataset.dest.includes(dst);
            item.style.display = (sm && dm) ? 'flex' : 'none';
            if (sm && dm) found++;
        });
        document.getElementById('noResults').style.display = found === 0 ? 'block' : 'none';
    }
</script>
</body>
</html>
