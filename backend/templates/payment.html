<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Payment — TravelGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a1628; --gold: #c9a84c; --gold-light: #e8c97a; --sand: #f5f0e8; --cream: #fdfaf4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

        .topbar { background: var(--navy); padding: 18px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(201,168,76,0.2); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
        .logo span { color: var(--gold); }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .payment-card { background: white; width: 100%; max-width: 500px; border-top: 4px solid var(--gold); box-shadow: 0 8px 40px rgba(10,22,40,0.1); }

        .card-header { background: var(--navy); padding: 28px 38px; }
        .card-header .eyebrow { color: var(--gold); font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 6px; }
        .card-header h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: white; }

        .card-body { padding: 32px 38px; }

        .summary-box { background: var(--sand); border: 1px solid rgba(201,168,76,0.2); padding: 22px 24px; margin-bottom: 28px; }
        .summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(10,22,40,0.06); }
        .summary-row:last-child { border-bottom: none; padding-top: 14px; }
        .s-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
        .s-value { font-size: 0.92rem; color: var(--navy); font-weight: 500; }
        .s-total .s-label { color: var(--navy); }
        .s-total .s-value { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--navy); }

        .form-label { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; padding: 13px 15px; margin-bottom: 18px; border: 1.5px solid rgba(10,22,40,0.12); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--navy); background: white; outline: none; transition: border-color 0.3s; }
        select:focus, input:focus { border-color: var(--gold); }

        .btn-pay { width: 100%; padding: 16px; background: var(--navy); color: var(--gold); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.3s; margin-top: 6px; position: relative; }
        .btn-pay::after { content: '→'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }
        .btn-pay:hover { background: #1a2f52; }

        .demo-note { text-align: center; font-size: 0.73rem; color: #bbb; margin-top: 14px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.82rem; transition: color 0.3s; }
        .back-link:hover { color: var(--navy); }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/dashboard" class="logo">Travel<span>Go</span></a>
        <span style="color:rgba(255,255,255,0.4); font-size:0.82rem; letter-spacing:0.06em;">SECURE PAYMENT</span>
    </div>

    <div class="main">
        <div class="payment-card">
            <div class="card-header">
                <div class="eyebrow">✦ Final Step</div>
                <h2>Confirm & Pay</h2>
            </div>
            <div class="card-body">
                <div class="summary-box">
                    <div class="summary-row">
                        <span class="s-label">Route</span>
                        <span class="s-value">{{ booking.details }}</span>
                    </div>
                    <div class="summary-row">
                        <span class="s-label">Date</span>
                        <span class="s-value">{{ booking.date }}</span>
                    </div>
                    <div class="summary-row">
                        <span class="s-label">Seats</span>
                        <span class="s-value">{{ booking.seat }}</span>
                    </div>
                    <div class="summary-row s-total">
                        <span class="s-label">Total Amount</span>
                        <span class="s-value">₹{{ booking.price }}</span>
                    </div>
                </div>

                <form action="/payment" method="POST">
                    <label class="form-label">Payment Method</label>
                    <select name="method" required>
                        <option value="" disabled selected>— Select Method —</option>
                        <option value="Net Banking">Net Banking</option>
                        <option value="UPI">UPI</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="Wallet">Wallet</option>
                    </select>

                    <label class="form-label">Transaction Reference</label>
                    <input type="text" name="reference" placeholder="Enter transaction / reference ID" required>

                    <button type="submit" class="btn-pay">Pay ₹{{ booking.price }}</button>
                    <div class="demo-note">* Demo UI — no actual payment is processed.</div>
                </form>

                <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left" style="font-size:0.75rem;"></i> Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
